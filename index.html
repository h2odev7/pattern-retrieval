<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pattern Retrieval</title>

<style>
body{
  background:#111;
  color:#0f0;
  font-family:monospace;
  display:flex;
  gap:40px;
  padding:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(8,50px);
  gap:4px;
}

.cell{
  width:50px;
  height:50px;
  background:#222;
  border:1px solid #444;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.cell.wall{ background:#000; cursor:default; }
.cell.selected{ outline:3px solid #0af; }

.cell span{
  font-size:20px;
  color:#ffa500;
}

/* KEYBOARD */
.keyboard{
  display:grid;
  grid-template-columns:repeat(6,50px);
  gap:6px;
}

.key{
  width:50px;
  height:50px;
  background:#222;
  border:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.key:hover{ background:#333; }
</style>
</head>

<body>

<div id="grid" class="grid"></div>
<div id="keyboard" class="keyboard"></div>

<script>

/* ===== DATA ===== */

const layout = [
['W','P','P','P','P','P','P','W'],
['W','W','P','P','P','W','P','P'],
['W','P','P','P','W','W','P','P'],
['W','W','P','P','P','P','P','P'],
['W','P','P','P','W','P','W','P'],
['W','P','P','P','P','P','P','P'],
['W','W','P','P','P','W','W','P'],
['W','W','P','P','P','W','W','W']
];

const answers = [
['#','S','E','N','D','I','T','#'],
['#','#','E','O','E','#','E','N'],
['#','I','E','D','#','#','M','O'],
['#','#','E','E','R','R','I','T'],
['#','T','E','R','#','O','#','H'],
['#','E','E','M','S','G','N','E'],
['#','#','T','A','P','#','#','R'],
['#','#','O','P','S','#','#','#']
];

/* ===== STATE ===== */

let selected = null;

let cells = layout.map((row,r)=>
  row.map((t,c)=>({
    wall: t === 'W',
    answer: answers[r][c],
    guess: ''
  }))
);

/* ===== RENDER ===== */

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  cells.forEach((row,r)=>{
    row.forEach((cell,c)=>{

      const div = document.createElement('div');
      div.className = 'cell';

      if(cell.wall){
        div.classList.add('wall');
      }else{

        if(selected && selected.r===r && selected.c===c){
          div.classList.add('selected');
        }

        if(cell.guess){
          const span = document.createElement('span');
          span.textContent = cell.guess;
          div.appendChild(span);
        }

        div.onclick = ()=> selectCell(r,c);
      }

      grid.appendChild(div);
    });
  });
}

/* ===== KEYBOARD ===== */

function renderKeyboard(){
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';

  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(letter=>{
    const key = document.createElement('div');
    key.className = 'key';
    key.textContent = letter;

    key.onclick = ()=> typeLetter(letter);

    kb.appendChild(key);
  });
}

/* ===== LOGIC ===== */

function selectCell(r,c){
  if(cells[r][c].wall) return;

  selected = {r,c};
  renderGrid();
}

function typeLetter(letter){
  if(!selected) return;

  const cell = cells[selected.r][selected.c];

  cell.guess = letter;

  // check correctness
  if(letter === cell.answer){
    cell.correct = true;
  }else{
    // flash wrong
    setTimeout(()=>{
      cell.guess = '';
      renderGrid();
    },300);
  }

  renderGrid();
}

/* ===== INIT ===== */

renderGrid();
renderKeyboard();

</script>
</body>
</html>
